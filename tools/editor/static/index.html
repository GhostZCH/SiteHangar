<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 编辑器</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="toolbar">
    <select id="siteSelector"></select>
    <button id="btnSetRoot" title="设置数据根目录">&#128193;</button>
    <span class="spacer"></span>
    <button id="btnNewFile">+ 新建文件</button>
    <button id="btnNewDir">+ 新建目录</button>
    <button id="btnSave" class="primary">保存 (Ctrl+S)</button>
    <button id="btnCompile" class="success">编译</button>
    <span id="statusText" class="status"></span>
  </div>

  <div class="editor-layout">
    <!-- 左侧文件树 -->
    <div class="file-tree" id="fileTree"></div>

    <!-- 中间编辑器 -->
    <div class="editor-pane" id="editorPane">
      <div class="empty-state" id="editorEmpty">
        <div class="empty-icon">&#128196;</div>
        <div>请从左侧选择一个文件或目录</div>
      </div>
      <div id="editorContent" style="display:none; flex-direction:column; height:100%;">
        <div class="editor-tabs" id="editorTabs"></div>
        <div id="chapterList" class="chapter-list" style="display:none;"></div>
        <textarea class="editor-textarea" id="editorTextarea" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- 右侧预览 -->
    <div class="preview-pane" id="previewPane">
      <h3>实时预览</h3>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <!-- 设置数据根目录对话框 -->
  <div class="modal-overlay hidden" id="setRootModal">
    <div class="modal">
      <h3>设置数据根目录</h3>
      <input type="text" id="rootInput" placeholder="如 E:\code\sitesanddata\my_sites_data\data" autofocus>
      <div class="modal-buttons">
        <button id="rootCancel">取消</button>
        <button id="rootConfirm" class="primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 新建文件/目录对话框 -->
  <div class="modal-overlay hidden" id="newFileModal">
    <div class="modal">
      <h3 id="modalTitle">新建</h3>
      <input type="text" id="modalInput" placeholder="名称" autofocus>
      <div class="modal-buttons">
        <button id="modalCancel">取消</button>
        <button id="modalConfirm" class="primary">确定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="editor.js"></script>
</body>
</html>
